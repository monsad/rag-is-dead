AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Resources:
  SqlAgentAPI:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SqlAgentAPI
      Handler: lambda_handler.lambda_handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          DB_HOST:
            Ref: DBHost
          DB_PORT:
            Ref: DBPort
          DB_NAME:
            Ref: DBName
          DB_USER:
            Ref: DBUser
          DB_PASSWORD:
            Ref: DBPassword
          OPENAI_API_KEY:
            Ref: OpenAIKey
      Events:
        Api:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      SamResourceId: SqlAgentAPI
Parameters:
  DBHost:
    Type: String
  DBPort:
    Type: String
    Default: '5432'
  DBName:
    Type: String
  DBUser:
    Type: String
  DBPassword:
    Type: String
    NoEcho: true
  OpenAIKey:
    Type: String
    NoEcho: true
